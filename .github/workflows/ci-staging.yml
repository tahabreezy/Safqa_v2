name: CI Staging

on:
  push:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run lint + tests
        run: |
          cd backend
          ruff check .
          pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/safqa-api:${{ github.sha }} ./backend
      - name: Build Frontend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/safqa-frontend:${{ github.sha }} ./frontend
      - name: Build Scraper image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/safqa-scraper:${{ github.sha }} ./scraper

  push:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push API image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/safqa-api:${{ github.sha }} ./backend
          docker push ghcr.io/${{ github.repository_owner }}/safqa-api:${{ github.sha }}
      - name: Push Frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/safqa-frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/safqa-frontend:${{ github.sha }}
      - name: Push Scraper image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/safqa-scraper:${{ github.sha }} ./scraper
          docker push ghcr.io/${{ github.repository_owner }}/safqa-scraper:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/safqa
            export REGISTRY_ORG=${{ github.repository_owner }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
