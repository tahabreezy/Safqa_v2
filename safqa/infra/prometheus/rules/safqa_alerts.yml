groups:
  - name: safqa
    rules:
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 2s for 5 minutes"

      - alert: ScrapeSilent
        expr: increase(safqa_tenders_scraped_total[6h]) == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "No tenders scraped in the last 6 hours"

      - alert: DLQNotEmpty
        expr: safqa_dlq_depth > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue has messages"

      - alert: DBPoolExhausted
        expr: pgbouncer_pool_clients_active > 18
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PgBouncer pool nearing exhaustion"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[10m]) / rate(http_requests_total[10m]) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx error rate > 1% over 10 minutes"

      - alert: ServiceDown
        expr: up{job="fastapi"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "FastAPI service is down"
